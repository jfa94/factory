name: Quality Gate

on:
  pull_request:
    branches: [staging, develop]

concurrency:
  group: quality-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate Next.js type declarations
        run: pnpm next typegen
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_KEY: ci-placeholder
          NEXT_SECRET_SUPABASE_KEY: ci-placeholder
      - run: pnpm deps:validate
      - name: pnpm audit (non-blocking; npm legacy endpoint 410, Snyk covers vulns)
        run: pnpm audit --audit-level=high
        continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/typescript
            p/security-audit
            p/secrets
      - name: TruffleHog secrets scan
        uses: trufflesecurity/trufflehog@61d57c10a563ba8a33a4c4205c85b5b3505a050e # main 2026-03-27
        with:
          extra_args: --only-verified

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Restore Stryker incremental cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: reports/mutation/.stryker-incremental.json
          key: ${{ runner.os }}-stryker-${{ github.base_ref }}-${{ github.head_ref }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-stryker-${{ github.base_ref }}-${{ github.head_ref }}-
            ${{ runner.os }}-stryker-${{ github.base_ref }}-
      - name: Compute changed src files (staging-target PRs only)
        if: github.base_ref == 'staging'
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=50
          mapfile -t files < <(
              git diff --name-only --diff-filter=AM "origin/$BASE_REF"...HEAD -- 'src/**/*.ts' \
              | grep -Ev '\.(test|spec|d)\.ts$|/types/|/data/|/index\.ts$' || true
          )
          if [ ${#files[@]} -eq 0 ]; then
              echo "scope=" >> "$GITHUB_OUTPUT"
          else
              printf -v joined '%s,' "${files[@]}"
              echo "scope=${joined%,}" >> "$GITHUB_OUTPUT"
          fi
      - name: Mutation (tight scope — staging-target PRs)
        if: github.base_ref == 'staging' && steps.changed.outputs.scope != ''
        env:
          MUTATE_SCOPE: ${{ steps.changed.outputs.scope }}
        run: pnpm exec stryker run --mutate "$MUTATE_SCOPE"
      - name: Mutation (skip — no mutable src changes in staging-target PR)
        if: github.base_ref == 'staging' && steps.changed.outputs.scope == ''
        run: echo "No mutable src changes; skipping mutation."
      - name: Mutation (full scope — develop-target rollup)
        if: github.base_ref == 'develop'
        run: pnpm test:mutation
      - name: Save Stryker incremental cache
        if: success()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: reports/mutation/.stryker-incremental.json
          key: ${{ runner.os }}-stryker-${{ github.base_ref }}-${{ github.head_ref }}-${{ github.sha }}

  auto-merge:
    name: Auto Merge
    runs-on: ubuntu-latest
    needs: [quality, mutation, security]
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Enable auto-merge on this PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --squash --auto
