name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: npm run verify (typecheck · lint · test · build)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history; some tests inspect the commit graph

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # matches package.json engines (node >=22)

      - name: Configure git identity for tests
        # Hook tests (branch-protection, secret-guard, the TDD commit-order gate)
        # create commits inside tmpdir git repos; CI runners ship without a git
        # identity, so `git commit` would abort with exit 128.
        run: |
          git config --global user.email "tests@factory.ci"
          git config --global user.name "factory-tests"

      - name: Install dependencies
        # No lockfile is checked in, so `npm ci` is unavailable — use install.
        run: npm install --no-audit --no-fund

      - name: Verify (typecheck · lint · test · build)
        run: npm run verify

      - name: Assert committed bundles match a fresh build (semgrep scans src, ships dist)
        # .semgrepignore excludes dist/, but dist/factory.js + dist/factory-hook.js are
        # the SHIPPED executables (package.json bin), deterministically rebuilt from the
        # scanned src/ by scripts/build.mjs. Proving committed == build(src) makes scanning
        # src equivalent to scanning the artifact. Fails loud if a bundle drifted from source.
        run: |
          npm run build
          git diff --exit-code -- dist/ templates/.github/scripts/shard-mutation-scope.mjs
